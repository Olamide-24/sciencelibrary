<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - Science Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Science<span class="highlight">Library</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="subjects.html" class="active">Subjects</a>
                <a href="book-viewer.html">Library</a>
                <div class="auth-section" id="authSection">
                    <a href="login.html" class="btn-login">Sign In</a>
                </div>
            </div>
            <button class="mobile-toggle" id="mobileToggle">☰</button>
        </div>
    </nav>

    <!-- Subject Header -->
    <section class="subject-header" id="subjectHeader">
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <span>/</span>
                <span id="currentSubject">All Subjects</span>
            </div>
            <h1 id="subjectTitle">All Subjects</h1>
            <p id="subjectDesc">Browse all available subjects and start learning</p>
        </div>
    </section>

    <!-- Filter Bar -->
    <section class="filter-section">
        <div class="container">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Subject:</label>
                    <select id="subjectFilter" onchange="filterBySubject()">
                        <option value="all">All Subjects</option>
                        <option value="english">English</option>
                        <option value="math">Mathematics</option>
                        <option value="physics">Physics</option>
                        <option value="chemistry">Chemistry</option>
                        <option value="biology">Biology</option>
                        <option value="further-math">Further Mathematics</option>
                        <option value="computer">Computer Science</option>
                        <option value="agriculture">Agriculture Science</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Level:</label>
                    <select id="levelFilter" onchange="filterByLevel()">
                        <option value="all">All Levels</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                
                <div class="search-filter">
                    <input type="text" id="topicSearch" placeholder="Search topics..." onkeyup="searchTopics()">
                </div>
            </div>
        </div>
    </section>

    <!-- Topics Grid -->
    <section class="topics-section">
        <div class="container">
            <div id="topicsGrid" class="topics-grid">
                <!-- Dynamically populated -->
            </div>
        </div>
    </section>

    <!-- Books for this Subject -->
    <section class="subject-books">
        <div class="container">
            <h2>Books in this Subject</h2>
            <div id="subjectBooks" class="books-grid">
                <p class="empty-state">Select a subject to see available books</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="logo-icon">📚</span>
                    <span>ScienceLibrary</span>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Science Library</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/book.js"></script>
    <script type="module" src="js/main.js"></script>
    <script>
        // Subject-specific data
        const subjectData = {

            },

</body>
</html>
