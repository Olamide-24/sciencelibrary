<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Science Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Science<span class="highlight">Library</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="subjects.html">Subjects</a>
                <a href="book-viewer.html">Library</a>
                <div class="auth-section" id="authSection">
                    <a href="login.html" class="btn-login">Sign In</a>
                </div>
            </div>
            <button class="mobile-toggle" id="mobileToggle">☰</button>
        </div>
    </nav>

    <section class="quiz-section">
        <div class="container">
            <div id="quizSetup" class="quiz-setup">
                <h1>📝 Practice Quiz</h1>
                <p>Select a subject and topic to test your knowledge</p>
                
                <div class="quiz-form">
                    <div class="form-group">
                        <label>Subject</label>
                        <select id="quizSubject">
                            <option value="">Select Subject</option>
                            <option value="english">English</option>
                            <option value="math">Mathematics</option>
                            <option value="physics">Physics</option>
                            <option value="chemistry">Chemistry</option>
                            <option value="biology">Biology</option>
                            <option value="further-math">Further Mathematics</option>
                            <option value="computer">Computer Science</option>
                            <option value="agriculture">Agriculture Science</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Level</label>
                        <select id="quizLevel">
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>
                    
                    <button onclick="startQuiz()" class="btn-primary btn-large">Start Quiz</button>
                </div>
            </div>

            <div id="quizInterface" class="quiz-interface" style="display:none;">
                <div class="quiz-header">
                    <div class="quiz-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="quizProgress"></div>
                        </div>
                        <span id="questionCounter">1/10</span>
                    </div>
                    <div class="quiz-score">Score: <span id="currentScore">0</span></div>
                </div>
                
                <div class="question-card">
                    <h3 id="questionText">Question text here?</h3>
                    <div id="optionsContainer" class="options-grid">
                        <!-- Options loaded dynamically -->
                    </div>
                    <div id="explanationBox" class="explanation-box" style="display:none;">
                        <p id="explanationText"></p>
                        <button onclick="nextQuestion()" class="btn-primary">Next Question →</button>
                    </div>
                </div>
            </div>

            <div id="quizResults" class="quiz-results" style="display:none;">
                <div class="results-card">
                    <h2>Quiz Complete! 🎉</h2>
                    <div class="final-score">
                        <span id="finalPercentage">0%</span>
                        <p>You got <span id="correctCount">0</span> out of <span id="totalCount">10</span> correct</p>
                    </div>
                    <div class="results-actions">
                        <button onclick="retryQuiz()" class="btn-secondary">Try Again</button>
                        <a href="subjects.html" class="btn-primary">Back to Subjects</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Science Library</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/quiz.js"></script>
</body>
</html>
