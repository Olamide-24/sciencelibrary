<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Science Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Science<span class="highlight">Library</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="subjects.html">Subjects</a>
                <a href="book-viewer.html" class="active">Library</a>
                <a href="quiz.html">Quizzes</a>
                <a href="profile.html">Profile</a>
                <div class="auth-section" id="authSection"></div>
            </div>
            <button class="mobile-toggle" id="mobileToggle">☰</button>
        </div>
    </nav>

    <section class="library-header">
        <div class="container">
            <h1>Digital Library</h1>
            <p>Browse, read, and download science textbooks and resources</p>
            
            <div class="library-filters">
                <div class="search-box library-search">
                    <input type="text" id="bookSearch" placeholder="Search books by title, author..." onkeyup="searchBooks(this.value)">
                    <button class="btn-search">🔍</button>
                </div>
                
                <div class="filter-chips">
                    <button class="chip active" onclick="filterBooks('all')">All</button>
                    <button class="chip" onclick="filterBooks('english')">English</button>
                    <button class="chip" onclick="filterBooks('math')">Math</button>
                    <button class="chip" onclick="filterBooks('physics')">Physics</button>
                    <button class="chip" onclick="filterBooks('chemistry')">Chemistry</button>
                    <button class="chip" onclick="filterBooks('biology')">Biology</button>
                    <button class="chip" onclick="filterBooks('further-math')">Further Math</button>
                    <button class="chip" onclick="filterBooks('computer')">Computer</button>
                    <button class="chip" onclick="filterBooks('agriculture')">Agriculture</button>
                </div>
                
                <div class="level-filters">
                    <select id="levelFilter" onchange="filterByLevel()">
                        <option value="all">All Levels</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <section class="library-content">
        <div class="container">
            <div id="booksContainer" class="books-grid">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading library...</p>
                </div>
            </div>
        </div>
    </section>

    <div id="pdfModal" class="modal">
        <div class="modal-content pdf-modal">
            <div class="modal-header">
                <h3 id="pdfTitle">Book Title</h3>
                <div class="modal-actions">
                    <button onclick="downloadCurrentBook()" class="btn-download-modal">⬇️ Download</button>
                    <button onclick="closePdfModal()" class="btn-close">✕</button>
                </div>
            </div>
            <div class="pdf-container">
                <iframe id="pdfFrame" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Science Library</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/book.js"></script>
</body>
</html>
