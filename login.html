<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Science Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">Science<span class="highlight">Library</span></span>
                </a>
                <h1 id="authTitle">Welcome Back</h1>
                <p id="authSubtitle">Sign in to track your progress</p>
            </div>

            <form id="authForm" class="auth-form">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input">
                        <input type="password" id="userPassword" placeholder="••••••••" required>
                        <button type="button" onclick="togglePassword()" class="toggle-pass">👁️</button>
                    </div>
                </div>

                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" id="authButton" class="btn-primary btn-full">Sign In</button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <button onclick="signInWithGoogle()" class="btn-google btn-full">
                <img src="https://www.google.com/favicon.ico" alt="G">
                Continue with Google
            </button>

            <div class="auth-footer">
                <p id="toggleText">Don't have an account? <a href="#" onclick="toggleMode()">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
