<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Science Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo" style="justify-content: center;">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">Science<span class="highlight">Library</span></span>
                </a>
                <h1 id="authTitle">Welcome Back</h1>
                <p id="authSubtitle">Sign in to track your progress</p>
            </div>

            <form id="authForm" class="auth-form">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input">
                        <input type="password" id="userPassword" placeholder="••••••••" required minlength="6">
                        <button type="button" onclick="togglePassword()" class="toggle-pass">👁️</button>
                    </div>
                    <small style="color: var(--gray-500); font-size: 0.75rem;">Minimum 6 characters</small>
                </div>

                <div id="forgotPassword" style="text-align: right; margin-top: -0.5rem; margin-bottom: 1rem;">
                    <a href="#" id="forgotPasswordLink" style="font-size: 0.875rem;">Forgot password?</a>
                </div>

                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" id="authButton" class="btn-primary btn-full">Sign In</button>
            </form>

            <div class="auth-footer">
                <p id="toggleText">Don't have an account? <a href="#" onclick="toggleMode(); return false;">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
