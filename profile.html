<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Science Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Science<span class="highlight">Library</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="subjects.html">Subjects</a>
                <a href="book-viewer.html">Library</a>
                <div class="auth-section" id="authSection">
                    <a href="profile.html" class="user-link active">Profile</a>
                </div>
            </div>
            <button class="mobile-toggle" id="mobileToggle">☰</button>
        </div>
    </nav>

    <section class="profile-section">
        <div class="container">
            <div class="profile-header">
                <div class="profile-avatar">
                    <span id="userInitials">👤</span>
                </div>
                <div class="profile-info">
                    <h1 id="profileName">Loading...</h1>
                    <p id="profileEmail">...</p>
                    <span class="badge" id="memberSince">Member</span>
                </div>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>

            <div class="profile-grid">
                <div class="profile-card stats-card">
                    <h3>Learning Stats</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="booksRead">0</span>
                            <span class="stat-label">Books Read</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="quizzesTaken">0</span>
                            <span class="stat-label">Quizzes</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="avgScore">0%</span>
                            <span class="stat-label">Avg Score</span>
                        </div>
                    </div>
                </div>

                <div class="profile-card">
                    <h3>Saved Books</h3>
                    <div id="savedBooksList" class="mini-list">
                        <p class="empty">No saved books yet</p>
                    </div>
                </div>

                <div class="profile-card">
                    <h3>Recent Activity</h3>
                    <div id="recentActivity" class="activity-list">
                        <p class="empty">Start learning to see activity</p>
                    </div>
                </div>

                <div class="profile-card settings-card">
                    <h3>Settings</h3>
                    <div class="setting-item">
                        <span>Dark Mode</span>
                        <button onclick="toggleDarkMode()" class="toggle-btn" id="darkModeToggle">OFF</button>
                    </div>
                    <div class="setting-item">
                        <span>Email Notifications</span>
                        <button class="toggle-btn active">ON</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Science Library</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
